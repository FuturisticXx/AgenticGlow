name: Klarity
options:
  createIntermediateGroups: true
  bundleIdPrefix: com.twodamax
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"
    CLANG_ENABLE_MODULES: YES
    ONLY_ACTIVE_ARCH: NO
targets:
  KlarityCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/KlarityCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib
  KlarityEvent:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/KlarityEvent
    dependencies:
      - target: KlarityCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.event
        PRODUCT_NAME: klarity-event
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path"
          - "@loader_path/../Frameworks"
          - "@loader_path/../../Frameworks"
          - "@executable_path/../Frameworks"
  Klarity:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/KlarityApp
    resources:
      - Sources/KlarityApp/Resources
    info:
      path: Config/Klarity-Info.plist
      properties:
        CFBundleDisplayName: Klarity
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: Copyright © 2026 Klarity contributors
    entitlements:
      path: Config/Klarity.entitlements
    dependencies:
      - target: KlarityCore
      - target: KlarityEvent
        embed: false
    postBuildScripts:
      - name: Embed Klarity event helper
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/bin"
          mkdir -p "$destination"
          cp "$BUILT_PRODUCTS_DIR/klarity-event" "$destination/klarity-event"
          chmod 755 "$destination/klarity-event"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity
        PRODUCT_NAME: Klarity
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  KlarityCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/KlarityCoreTests
      - Tests/TestSupport
      - Tests/Fixtures
    dependencies:
      - target: KlarityCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.core-tests
        GENERATE_INFOPLIST_FILE: YES
  KlarityEventTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/KlarityEventTests
      - Tests/TestSupport
      - Tests/Fixtures
    dependencies:
      - target: KlarityCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.event-tests
        GENERATE_INFOPLIST_FILE: YES
  KlarityAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/KlarityAppTests
      - Tests/TestSupport
    dependencies:
      - target: Klarity
      - target: KlarityCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.app-tests
        GENERATE_INFOPLIST_FILE: YES
  KlarityUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/KlarityUITests
    dependencies:
      - target: Klarity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.klarity.ui-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Klarity:
    build:
      targets:
        Klarity: all
        KlarityCoreTests: [test]
        KlarityEventTests: [test]
        KlarityAppTests: [test]
        KlarityUITests: [test]
    test:
      targets:
        - KlarityCoreTests
        - KlarityEventTests
        - KlarityAppTests
        - KlarityUITests
  KlarityEvent:
    build:
      targets:
        KlarityEvent: all
        KlarityEventTests: [test]
    test:
      targets:
        - KlarityEventTests
