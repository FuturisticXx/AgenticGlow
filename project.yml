name: AgenticGlow
options:
  createIntermediateGroups: true
  bundleIdPrefix: com.twodamax
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"
    CLANG_ENABLE_MODULES: YES
    ONLY_ACTIVE_ARCH: NO
targets:
  AgenticGlowCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/AgenticGlowCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib
  AgenticGlowEvent:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/AgenticGlowEvent
    dependencies:
      - target: AgenticGlowCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.event
        PRODUCT_NAME: agenticglow-event
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path"
          - "@loader_path/../Frameworks"
          - "@loader_path/../../Frameworks"
          - "@executable_path/../Frameworks"
  AgenticGlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/AgenticGlowApp
    resources:
      - Sources/AgenticGlowApp/Resources
    info:
      path: Config/AgenticGlow-Info.plist
      properties:
        CFBundleDisplayName: AgenticGlow
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: Copyright © 2026 AgenticGlow contributors
    entitlements:
      path: Config/AgenticGlow.entitlements
    dependencies:
      - target: AgenticGlowCore
      - target: AgenticGlowEvent
        embed: false
    postBuildScripts:
      - name: Embed AgenticGlow event helper
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/bin"
          mkdir -p "$destination"
          cp "$BUILT_PRODUCTS_DIR/agenticglow-event" "$destination/agenticglow-event"
          chmod 755 "$destination/agenticglow-event"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow
        PRODUCT_NAME: AgenticGlow
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  AgenticGlowCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/AgenticGlowCoreTests
      - Tests/TestSupport
      - Tests/Fixtures
    dependencies:
      - target: AgenticGlowCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.core-tests
        GENERATE_INFOPLIST_FILE: YES
  AgenticGlowEventTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/AgenticGlowEventTests
      - Tests/TestSupport
      - Tests/Fixtures
    dependencies:
      - target: AgenticGlowCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.event-tests
        GENERATE_INFOPLIST_FILE: YES
  AgenticGlowAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/AgenticGlowAppTests
      - Tests/TestSupport
    dependencies:
      - target: AgenticGlow
      - target: AgenticGlowCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.app-tests
        GENERATE_INFOPLIST_FILE: YES
  AgenticGlowUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/AgenticGlowUITests
    dependencies:
      - target: AgenticGlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twodamax.agenticglow.ui-tests
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
schemes:
  AgenticGlow:
    build:
      targets:
        AgenticGlow: all
        AgenticGlowCoreTests: [test]
        AgenticGlowEventTests: [test]
        AgenticGlowAppTests: [test]
        AgenticGlowUITests: [test]
    test:
      targets:
        - AgenticGlowCoreTests
        - AgenticGlowEventTests
        - AgenticGlowAppTests
        - AgenticGlowUITests
  AgenticGlowEvent:
    build:
      targets:
        AgenticGlowEvent: all
        AgenticGlowEventTests: [test]
    test:
      targets:
        - AgenticGlowEventTests
